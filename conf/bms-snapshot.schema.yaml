# BMS Snapshot Schema
# A point-in-time observation of a building's BMS state: what the building
# is doing right now. This is the view an energy manager sees when flipping
# through BMS screens — actuals vs. setpoints, operating modes, demand
# signals, and anything that looks out of place.
#
# References building_id to link to the stable facts in building-profile.schema.yaml.
# Equipment IDs (air_systems[].id, etc.) must match those in the profile.
#
# Types: string, number, boolean, null, [type] = array of type
# Fields marked (optional) may be omitted when data is unavailable.


# ─── HEADER ──────────────────────────────────────────────────────────────────

building_id: string              # Matches building.id in building-profile.schema.yaml
timestamp: string                # ISO 8601, e.g. "2024-10-15T14:30:00-05:00"


# ─── AMBIENT CONDITIONS ──────────────────────────────────────────────────────
# Outdoor conditions at the moment of observation. Essential context for
# interpreting whether equipment behavior is appropriate:
#   - Is the economizer justified given OAT and RH?
#   - Should the boiler be firing at this OAT?
#   - Is static pressure appropriate for this load condition?

conditions:
  oat_f: number                  # Outdoor air temperature (°F)
  rh_pct: number | null          # (optional) Outdoor relative humidity (%)
  season: string | null          # (optional) heating | cooling | shoulder


# ─── AIR SYSTEMS ─────────────────────────────────────────────────────────────
# Current state of each air-handling system. One entry per unit; id must
# match an entry in building-profile air_systems[].
# For parallel fan arrays, list each physical fan in fans[] so that speed
# imbalances between units sharing a plenum are visible.

air_systems:
  - id: string                   # Must match building profile equipment tag

    mode: string                 # occupied | unoccupied | override | off
    out_of_schedule: boolean     # True if running outside its designed_schedule
    control_source: string       # BAS | local | manual

    fans:
      # One entry per physical fan. For single-fan units, one entry suffices.
      - id: string               # e.g. "SF-5", "RF-1"
        role: string             # supply | return | exhaust | relief
        status: string           # on | off | fault
        vfd_pct: number | null   # Speed command (%)

      sa_static_pressure_actual_inwc: number | null
      sa_static_pressure_setpoint_inwc: number | null  # As currently programmed in BAS

    temperatures:
      supply_air_actual_f: number | null
      supply_air_setpoint_f: number | null   # As currently programmed in BAS
      return_air_f: number | null
      discharge_air_f: number | null         # (optional) Coil leaving air, where distinct

    economizer:
      active: boolean                        # Is the economizer currently enabled?
      position_pct: number | null            # Damper position (0=full return, 100=full OA)

    vav_demand_pct: number | null            # Max zone pressure/heating demand signal (0–100%)
                                             # Near 0 with fans at high speed = over-pressurized

    overrides: [string]                      # Active manual overrides, free-text descriptions
    notes: string | null


# ─── HEATING PLANT ───────────────────────────────────────────────────────────
# Current state of the heating plant. For district steam, boilers[] is omitted.

heating_plant:

  boilers:                       # (optional) Omit if district steam
    - id: string                 # Must match building profile boiler tag
      status: string             # on | off | standby
      firing_rate_pct: number | null
      outlet_temp_f: number | null
      runtime_hrs: number | null   # (optional) Lifetime hours — flags aging / wear
      cycle_count: number | null   # (optional) High count relative to runtime = short-cycling

  hws_temp_actual_f: number | null
  hws_temp_setpoint_f: number | null   # Active setpoint as currently programmed

  # OAT reset as currently configured in the BAS — compare against design values
  # in the profile to detect drift, manual overrides, or misconfiguration.
  hws_oat_reset_active:
    oat_min_f: number | null     # Current programmed OAT at max HWS temp
    oat_max_f: number | null     # Current programmed OAT at min HWS temp
    hws_min_f: number | null     # Current programmed HWS min (mild weather)
    hws_max_f: number | null     # Current programmed HWS max (cold weather)

  vav_heat_request_pct: number | null  # Building-wide % of zones calling for heat
                                        # Key signal: boiler firing with 0% demand = waste


# ─── COOLING PLANT ───────────────────────────────────────────────────────────

cooling_plant:
  chws_temp_actual_f: number | null
  chws_temp_setpoint_f: number | null  # Active setpoint as currently programmed
  oat_reset_active: boolean | null     # Is CHWS OAT reset currently executing?

  units:                         # (optional)
    - id: string
      status: string             # on | off | standby
      current_load_pct: number | null
      efficiency_kw_per_ton: number | null   # (optional) If reported by BMS


# ─── VAV ZONES ───────────────────────────────────────────────────────────────
# (optional) Include when zone-level data is available and relevant —
# e.g. to spot simultaneous heating+cooling, comfort complaints, or
# zones with wide-open dampers driving unnecessary duct pressure.

zones:
  - id: string
    name: string | null
    space_temp_actual_f: number | null
    space_temp_setpoint_f: number | null
    damper_position_pct: number | null   # 0=closed, 100=full open
    reheat_active: boolean | null
    notes: string | null


# ─── ANOMALIES ───────────────────────────────────────────────────────────────
# Pre-flagged observations to direct the LLM's attention. Can be populated
# by automated screening (e.g. boiler_on AND vav_heat_request < 5%) or
# manually by the analyst before the LLM session begins.

anomalies:
  - system_id: string            # Equipment ID, or "building" for whole-building issues
    description: string          # What was observed, in plain language
    severity: string             # info | warning | critical
